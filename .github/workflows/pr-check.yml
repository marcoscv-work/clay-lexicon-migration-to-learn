name: PR check

# Runs on every pull request: builds the site (which fails on broken internal
# links via VitePress ignoreDeadLinks:false) and runs the Markdown link checker
# over /docs. Broken internal links fail the check; external links are not
# fetched.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check internal links in /docs
        run: npm run lint:links

      - name: Build the site
        run: npm run docs:build
